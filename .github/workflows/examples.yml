name: examples

on:
  push:
    branches: [main]
    paths:
      - "swap-program/**"
      - "escrow-program/**"
      - ".github/workflows/examples.yml"
  pull_request:
    paths:
      - "swap-program/**"
      - "escrow-program/**"
      - ".github/workflows/examples.yml"

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match the Anza/agave + SBF toolchain the zolana release is built against
  # (zolana's own CI pins these).
  AGAVE_VERSION: v4.0.2
  SBF_TOOLS_VERSION: v1.54

jobs:
  swap-build:
    name: build / swap-program
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The zolana SDK crates live in the private helius-labs/zolana repo. Fetch
      # every github.com git dep over HTTPS with a token so the ssh:// deps
      # (see swap-program/.cargo/config.toml) authenticate. ZOLANA_SDK_TOKEN must
      # have read access to helius-labs/zolana.
      - name: Configure git auth for private zolana deps
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.ZOLANA_SDK_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"
          git config --global \
            url."https://x-access-token:${{ secrets.ZOLANA_SDK_TOKEN }}@github.com/".insteadOf \
            "ssh://git@github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: swap-program

      - name: Install Anza (Solana) CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${AGAVE_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install pinned SBF platform tools
        working-directory: swap-program/program
        run: cargo build-sbf --tools-version "$SBF_TOOLS_VERSION" --install-only

      - name: Build swap program (SBF)
        working-directory: swap-program/program
        run: cargo build-sbf --tools-version "$SBF_TOOLS_VERSION" -- --features bpf-entrypoint

  escrow-build:
    name: build / escrow-program
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git auth for private zolana deps
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.ZOLANA_SDK_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"
          git config --global \
            url."https://x-access-token:${{ secrets.ZOLANA_SDK_TOKEN }}@github.com/".insteadOf \
            "ssh://git@github.com/"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: escrow-program

      - name: Install Anza (Solana) CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/${AGAVE_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install pinned SBF platform tools
        working-directory: escrow-program/program
        run: cargo build-sbf --tools-version "$SBF_TOOLS_VERSION" --install-only

      - name: Build escrow program (SBF)
        working-directory: escrow-program/program
        run: cargo build-sbf --tools-version "$SBF_TOOLS_VERSION" -- --features bpf-entrypoint
